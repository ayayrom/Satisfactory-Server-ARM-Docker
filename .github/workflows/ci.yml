name: Satisfactory ARM64 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  shellcheck:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'

  build-test:
    name: Build docker images
    runs-on: ubuntu-22.04-arm
    needs: shellcheck
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Test build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          load: true
          tags: satisfactory-arm64:${{ matrix.dockerfile }}-ci
          cache-from: type=gha,scope=satisfactory-${{ matrix.dockerfile }}
          cache-to: type=gha,scope=satisfactory-${{ matrix.dockerfile }},mode=max

      - name: Save image for next job
        run: |
          docker save satisfactory-arm64:${{ matrix.dockerfile }}-ci -o /tmp/image-${{ matrix.dockerfile }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.dockerfile }}
          path: /tmp/image-${{ matrix.dockerfile }}.tar
          retention-days: 1

  server-build-test:
    name: Test server startup
    runs-on: ubuntu-22.04-arm
    needs: build-test
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image-${{ matrix.dockerfile }}
          path: /tmp

      - name: Load image into Docker
        run: |
          docker load -i /tmp/image-${{ matrix.dockerfile }}.tar
          docker image ls satisfactory-arm64

      - name: Run SteamCMD in test mode
        run: |
          docker run \
            --rm \
            -e CI_TEST_MODE=true \
            -e ALWAYS_UPDATE_ON_START=false \
            -e STEAM_APP_ID=1690800 \
            -e GAME_EXEC=FactoryServer.sh \
            satisfactory-arm64:${{ matrix.dockerfile }}-ci

  push-build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-22.04-arm
    needs: server-build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag Suffix
        id : vars
        run: |
          if [ "${{ matrix.dockerfile }}" = "Dockerfile.generic" ]; then
            echo "tag=generic" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/satisfactory-arm64:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/satisfactory-arm64:${{ github.sha }}-${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=satisfactory-${{ matrix.dockerfile }}
          cache-to: type=gha,scope=satisfactory-${{ matrix.dockerfile }},mode=max
