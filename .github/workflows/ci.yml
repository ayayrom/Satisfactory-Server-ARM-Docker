name: Satisfactory ARM64 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  shellcheck:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'

  build-test-push:
    name: Core pipeline
    runs-on: ubuntu-22.04-arm
    needs: shellcheck
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          load: true
          tags: satisfactory-arm64:${{ matrix.dockerfile }}-ci
          cache-from: type=gha,scope=satisfactory-${{ matrix.dockerfile }}
          cache-to: type=gha,scope=satisfactory-${{ matrix.dockerfile }},mode=max

      - name: Run SteamCMD in test mode
        run: |
          docker run \
            --rm \
            -e CI_TEST_MODE=true \
            -e ALWAYS_UPDATE_ON_START=false \
            -e STEAM_APP_ID=1690800 \
            -e GAME_EXEC=FactoryServer.sh \
            satisfactory-arm64:${{ matrix.dockerfile }}-ci

      # we are only publishing .generic as its most portable
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref 'refs/heads/main' && matrix.dockerfile = 'Dockerfile.generic'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Generic to Docker Hub
        if: github.event_name == 'push' && github.ref 'refs/heads/main' && matrix.dockerfile = 'Dockerfile.generic'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/satisfactory-arm64:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/satisfactory-arm64:${{ github.sha }}
          cache-from: type=gha,scope=satisfactory${{ matrix.dockerfile }}